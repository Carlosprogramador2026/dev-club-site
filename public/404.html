<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>dev club</title>
    <script>
      // Redireciona rotas do React Router pro index.html no GitHub Pages,
      // que não sabe servir index.html pra caminhos que não existem como
      // arquivo de verdade (ex: /cursos/react).
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
